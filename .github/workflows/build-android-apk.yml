name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: android-app
        shell: bash
        run: |
          set -o pipefail
          gradle :app:assembleDebug --stacktrace --warning-mode all 2>&1 | tee ../gradle-build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: step-image-edit-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Commit Gradle log on failure
        if: failure()
        run: |
          cp gradle-build.log last-gradle-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f last-gradle-build.log
          git commit -m "Update Android build failure log" || exit 0
          git push
